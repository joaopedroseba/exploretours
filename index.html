function Stripe({ height = 200, grad, icon, opacity = 0.26, iconSize = 80, photo, photoPos = 'center center' }) {
  if (photo) {
    return (
      <div style={{ height, position: 'relative', overflow: 'hidden', flexShrink: 0, background: grad }}>
        <img src={photo} alt="" loading="lazy"
        style={{ width: '100%', height: '100%', objectFit: 'cover', objectPosition: photoPos, display: 'block' }} />
        <div style={{ position: 'absolute', inset: 0,
          background: 'linear-gradient(to bottom,rgba(0,0,0,.08) 0%,rgba(0,0,0,.28) 100%)' }} />
      </div>);

  }
  return (
    <div style={{ height, background: grad, position: 'relative', overflow: 'hidden',
      flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
      <div style={{ position: 'absolute', inset: 0,
        backgroundImage: 'repeating-linear-gradient(45deg,rgba(255,255,255,.04) 0,rgba(255,255,255,.04) 1px,transparent 1px,transparent 16px)' }} />
      <span style={{ fontSize: iconSize, opacity, userSelect: 'none', pointerEvents: 'none' }}>{icon}</span>
    </div>);

}

function Stars({ rating, size = 10 }) {
  return <span style={{ color: ORANGE, fontSize: size, letterSpacing: 1.5 }}>
    {'★'.repeat(Math.floor(rating))}{rating % 1 >= .5 ? '½' : ''}
  </span>;
}

// ── APP ───────────────────────────────────────────────────────────────
function App() {
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [tweaksOpen, setTweaksOpen] = useState(false);

  useEffect(() => {
    const h = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', h);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', h);
  }, []);

  function upd(k, v) {
    const n = { ...tweaks, [k]: v };
    setTweaks(n);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: n }, '*');
  }

  const loc = LOCATIONS[tweaks.location] || LOCATIONS.atins;
  const availTours = loc.tours;

  const screens = [
  { label: '01 · Início', sub: 'Escolha sua Base', node: <LocationChooser />, sl: '01 Base Chooser' },
  { label: '02 · Atins', sub: 'Passeios em Atins', node: <LocationFeed locId="atins" />, sl: '02 Atins' },
  { label: '03 · Santo Amaro', sub: 'Passeios em Santo Amaro', node: <LocationFeed locId="santoAmaro" />, sl: '03 Santo Amaro' },
  { label: '04 · Barreirinhas', sub: 'Passeios em Barreirinhas', node: <LocationFeed locId="barreirinhas" />, sl: '04 Barreirinhas' },
  { label: '05 · Detalhe', sub: 'Tour Detail', node: <DetailScreen locId={tweaks.location} tourId={tweaks.featuredTour} />, sl: '05 Tour Detail' }];


  return (
    <>
      {/* Wordmark */}
      <div style={{ position: 'fixed', top: 26, left: 44, zIndex: 100,
        fontFamily: '"Cormorant Garamond",serif',
        fontSize: 19, color: 'rgba(255,255,255,.5)', letterSpacing: '.04em', userSelect: 'none' }}>
        Explore <span style={{ color: ORANGE, fontStyle: 'italic' }}>Atins</span>
        <span style={{ fontSize: 9.5, color: 'rgba(255,255,255,.2)', letterSpacing: '.22em',
          textTransform: 'uppercase', marginLeft: 14 }}>App Design · 2026</span>
      </div>

      {/* Canvas */}
      <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center',
        padding: '90px 80px 70px', gap: 48, overflowX: 'auto' }}>
        {screens.map((s, i) =>
        <div key={i} data-screen-label={s.sl}>
            <Phone label={s.label} sublabel={s.sub}>{s.node}</Phone>
          </div>
        )}
      </div>

      {/* Tweaks */}
      <div className={`tweaks-panel ${tweaksOpen ? 'open' : ''}`}>
        <div className="tweaks-ttl">Tweaks</div>
        <div className="tweak-row">
          <span className="tweak-lbl">Base (tela 05)</span>
          <select className="tweak-sel" value={tweaks.location}
          onChange={(e) => {
            const newLoc = e.target.value;
            const firstTour = LOCATIONS[newLoc].tours[0].id;
            upd('location', newLoc);
            setTimeout(() => upd('featuredTour', firstTour), 10);
          }}>
            <option value="atins">Atins</option>
            <option value="santoAmaro">Santo Amaro</option>
            <option value="barreirinhas">Barreirinhas</option>
          </select>
        </div>
        <div className="tweak-row">
          <span className="tweak-lbl">Passeio em destaque</span>
          <select className="tweak-sel" value={tweaks.featuredTour}
          onChange={(e) => upd('featuredTour', e.target.value)}>
            {availTours.map((t) => <option key={t.id} value={t.id}>{t.name}</option>)}
          </select>
        </div>
      </div>
    </>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
