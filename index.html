<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

  body{background:radial-gradient(ellipse at 25% 60%,rgba(30,110,138,.18) 0%,transparent 55%),#090f14;display:flex;align-items:center;justify-content:center}
  @media(max-width:430px){body{background:#090f14}}
  ::-webkit-scrollbar{width:0;height:0}

  .phone-shell{
    width:393px;height:852px;border-radius:46px;overflow:hidden;
    background:#faf5ec;position:relative;
    box-shadow:0 0 0 12px #181820,0 0 0 13px rgba(255,255,255,.07),0 60px 120px rgba(0,0,0,.8);
  }

    .phone-shell{width:100vw;height:100dvh;border-radius:0;box-shadow:none}
  }

  .screen{position:absolute;inset:0;display:flex;flex-direction:column;background:#faf5ec;overflow:hidden}

  .screen-scroll::-webkit-scrollbar{width:0}

  @keyframes slideInRight{from{transform:translateX(100%)}to{transform:translateX(0)}}
  @keyframes slideInLeft{from{transform:translateX(-30%);opacity:.5}to{transform:translateX(0);opacity:1}}

  .slide-back{animation:slideInLeft .25s cubic-bezier(.4,0,.2,1) both}

  .island{position:absolute;top:14px;left:50%;transform:translateX(-50%);width:122px;height:36px;background:#0d1a1e;border-radius:20px;z-index:60;pointer-events:none}
  .status-bar{height:52px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 26px 8px;flex-shrink:0;position:relative;z-index:10}
  .bottom-bar{position:absolute;bottom:0;left:0;right:0;height:84px;background:rgba(250,245,236,.93);backdrop-filter:blur(20px);border-top:1px solid #d4c4a0;display:flex;align-items:flex-start;padding:10px 8px 0;z-index:20}

  .tab-lbl{font-size:9.5px;font-weight:400;color:#6a8a9a}

// ── HELPERS ────────────────────────────────────────────────────
function Stripe({height=200,grad,icon,opacity=.26,iconSize=80,photo,photoPos='center center'}){
  if(photo) return(
    <div style={{height,position:'relative',overflow:'hidden',flexShrink:0,background:grad}}>
      <img src={photo} alt="" loading="lazy" style={{width:'100%',height:'100%',objectFit:'cover',objectPosition:photoPos,display:'block'}}/>
      <div style={{position:'absolute',inset:0,background:'linear-gradient(to bottom,rgba(0,0,0,.08) 0%,rgba(0,0,0,.28) 100%)'}}/>
    </div>
  );
  return(
    <div style={{height,background:grad,position:'relative',overflow:'hidden',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{position:'absolute',inset:0,backgroundImage:'repeating-linear-gradient(45deg,rgba(255,255,255,.04) 0,rgba(255,255,255,.04) 1px,transparent 1px,transparent 16px)'}}/>
      <span style={{fontSize:iconSize,opacity,userSelect:'none'}}>{icon}</span>
    </div>
  );
}
function Stars({n=5,size=10}){return <span style={{color:ORANGE,fontSize:size,letterSpacing:1.5}}>{'★'.repeat(n)}</span>}
function StatusBar({light=false,onBack,title}){
  const c=light?'rgba(255,255,255,.9)':DARK;
  return(
    <div style={{height:52,display:'flex',alignItems:'flex-end',justifyContent:'space-between',padding:'0 20px 8px',flexShrink:0,zIndex:10,position:'relative'}}>
      {onBack
        ? <button onClick={onBack} style={{background:'none',border:'none',color:c,fontSize:22,lineHeight:1,padding:'0 4px',marginLeft:-4}}>‹</button>
        : <span style={{fontSize:14,fontWeight:700,color:c}}>9:41</span>}
      {title && <span style={{fontSize:14,fontWeight:600,color:c,position:'absolute',left:'50%',transform:'translateX(-50%)',bottom:9}}>{title}</span>}
      <div style={{display:'flex',gap:5,alignItems:'center'}}>
        <svg width="15" height="11" viewBox="0 0 17 12" fill={c} opacity={.85}><rect x="0" y="7" width="3" height="5" rx=".6"/><rect x="4.7" y="5" width="3" height="7" rx=".6"/><rect x="9.4" y="2.5" width="3" height="9.5" rx=".6"/><rect x="14.1" y="0" width="3" height="12" rx=".6"/></svg>
        <div style={{display:'flex',alignItems:'center',gap:1.5}}>
          <div style={{width:22,height:11,border:`1.5px solid ${c}`,borderRadius:3,padding:'1.5px',opacity:.85}}>
            <div style={{width:'82%',height:'100%',background:c,borderRadius:1.5}}/>
          </div>
        </div>
      </div>
    </div>
  );
}
function BottomBar({active=0,accent=TEAL}){
  const tabs=[{icon:'⊞',lbl:'Início'},{icon:'◎',lbl:'Explorar'},{icon:'♡',lbl:'Favoritos'},{icon:'☰',lbl:'Roteiro'}];
  return(
    <div className="bottom-bar">
      {tabs.map((t,i)=>(
        <div key={i} className="tab">
          <div className="tab-icon" style={{background:i===active?`${accent}22`:'transparent'}}><span style={{opacity:i===active?1:.35}}>{t.icon}</span></div>
          <span className={`tab-lbl${i===active?' on':''}`} style={{color:i===active?accent:MUTED}}>{t.lbl}</span>
        </div>
      ))}
    </div>
  );
}

// ── APP ─────────────────────────────────────────────────────────
function App(){
  const [screen,setScreen]=useState('chooser');
  const [params,setParams]=useState({});
  const [stack,setStack]=useState([]);
  const [goingBack,setGoingBack]=useState(false);

  // Persist last screen
  useEffect(()=>{
    const saved=localStorage.getItem('ea_screen');
    const savedParams=localStorage.getItem('ea_params');
    if(saved&&saved!=='chooser'){setScreen(saved);if(savedParams)setParams(JSON.parse(savedParams));}
  },[]);

  function go(newScreen,newParams={}){
    setGoingBack(false);
    setStack(s=>[...s,{screen,params}]);
    setScreen(newScreen);
    setParams(newParams);
    localStorage.setItem('ea_screen',newScreen);
    localStorage.setItem('ea_params',JSON.stringify(newParams));
  }

  function back(){
    if(stack.length===0){setScreen('chooser');setParams({});return;}
    setGoingBack(true);
    const prev=stack[stack.length-1];
    setStack(s=>s.slice(0,-1));
    setScreen(prev.screen);
    setParams(prev.params);
    localStorage.setItem('ea_screen',prev.screen);
    localStorage.setItem('ea_params',JSON.stringify(prev.params));
  }

  const p=params;

  return(
    <div className="phone-shell">
      {screen==='chooser'  && <ChooserScreen go={go}/>}
      {screen==='feed'     && <FeedScreen go={go} back={back} locId={p.locId||'atins'}/>}
      {screen==='detail'   && <DetailScreen go={go} back={back} locId={p.locId} tourId={p.tourId} ptype={p.ptype} price={p.price}/>}
      {screen==='datepicker'&&<DateScreen go={go} back={back} locId={p.locId} tourId={p.tourId} ptype={p.ptype} price={p.price}/>}
      {screen==='confirm'  && <ConfirmScreen go={go} back={back} locId={p.locId} tourId={p.tourId} ptype={p.ptype} price={p.price} day={p.day} time={p.time} travelers={p.travelers} total={p.total}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
