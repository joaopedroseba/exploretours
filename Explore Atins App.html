function Stripe({height=200,grad,icon,opacity=.26,iconSize=80,photo,photoPos='center center'}){
  if(photo) return(
    <div style={{height,position:'relative',overflow:'hidden',flexShrink:0,background:grad}}>
      <img src={photo} alt="" loading="lazy" style={{width:'100%',height:'100%',objectFit:'cover',objectPosition:photoPos,display:'block'}}/>
      <div style={{position:'absolute',inset:0,background:'linear-gradient(to bottom,rgba(0,0,0,.08) 0%,rgba(0,0,0,.28) 100%)'}}/>
    </div>
  );
  return(
    <div style={{height,background:grad,position:'relative',overflow:'hidden',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{position:'absolute',inset:0,backgroundImage:'repeating-linear-gradient(45deg,rgba(255,255,255,.04) 0,rgba(255,255,255,.04) 1px,transparent 1px,transparent 16px)'}}/>
      <span style={{fontSize:iconSize,opacity,userSelect:'none'}}>{icon}</span>
    </div>
  );
}
function Stars({n=5,size=10}){return <span style={{color:ORANGE,fontSize:size,letterSpacing:1.5}}>{'★'.repeat(n)}</span>}
function StatusBar({light=false,onBack,title}){
  const c=light?'rgba(255,255,255,.9)':DARK;
  return(
    <div style={{height:52,display:'flex',alignItems:'flex-end',justifyContent:'space-between',padding:'0 20px 8px',flexShrink:0,zIndex:10,position:'relative'}}>
      {onBack
        ? <button onClick={onBack} style={{background:'none',border:'none',color:c,fontSize:22,lineHeight:1,padding:'0 4px',marginLeft:-4}}>‹</button>
        : <span style={{fontSize:14,fontWeight:700,color:c}}>9:41</span>}
      {title && <span style={{fontSize:14,fontWeight:600,color:c,position:'absolute',left:'50%',transform:'translateX(-50%)',bottom:9}}>{title}</span>}
      <div style={{display:'flex',gap:5,alignItems:'center'}}>
        <svg width="15" height="11" viewBox="0 0 17 12" fill={c} opacity={.85}><rect x="0" y="7" width="3" height="5" rx=".6"/><rect x="4.7" y="5" width="3" height="7" rx=".6"/><rect x="9.4" y="2.5" width="3" height="9.5" rx=".6"/><rect x="14.1" y="0" width="3" height="12" rx=".6"/></svg>
        <div style={{display:'flex',alignItems:'center',gap:1.5}}>
          <div style={{width:22,height:11,border:`1.5px solid ${c}`,borderRadius:3,padding:'1.5px',opacity:.85}}>
            <div style={{width:'82%',height:'100%',background:c,borderRadius:1.5}}/>
          </div>
        </div>
      </div>
    </div>
  );
}
function BottomBar({active=0,accent=TEAL,onNav=()=>{},cartCount=0}){
  const tabs=[
    {icon:'⊞',lbl:'Início',screen:'chooser'},
    {icon:'◎',lbl:'Explorar',screen:'explore'},
    {icon:'♡',lbl:'Favoritos',screen:'favorites'},
    {icon:'☰',lbl:'Roteiro',screen:'cart'},
  ];
  return(
    <div className="bottom-bar">
      {tabs.map((tab,i)=>(
        <div key={i} className="tab" onClick={()=>onNav(tab.screen)} style={{position:'relative'}}>
          <div className="tab-icon" style={{background:i===active?`${accent}22`:'transparent'}}>
            <span style={{opacity:i===active?1:.35}}>{tab.icon}</span>
            {i===3&&cartCount>0&&<span style={{position:'absolute',top:-2,right:2,background:ORANGE,color:'white',borderRadius:10,minWidth:16,height:16,fontSize:9,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',padding:'0 4px'}}>{cartCount}</span>}
          </div>
          <span className={`tab-lbl${i===active?' on':''}`} style={{color:i===active?accent:MUTED}}>{tab.lbl}</span>
        </div>
      ))}
    </div>
  );
}

// ── SCREEN: WELCOME ────────────────────────────────────────────
function WelcomeScreen({go,lang,toggleLang,t}){
  const [name,setName]=useState('');
  const [idaData,setIdaData]=useState('');
  const [idaHorario,setIdaHorario]=useState('');
  const [voltaData,setVoltaData]=useState('');
  const [voltaHorario,setVoltaHorario]=useState('');
  const [hospedagem,setHospedagem]=useState('');
  const [countryCode,setCountryCode]=useState('+55');
  const [phone,setPhone]=useState('');

  const COUNTRIES=[
    {code:'+55',flag:'🇧🇷',label:'BR'},
    {code:'+1',flag:'🇺🇸',label:'US'},
    {code:'+44',flag:'🇬🇧',label:'UK'},
    {code:'+33',flag:'🇫🇷',label:'FR'},
    {code:'+54',flag:'🇦🇷',label:'AR'},
    {code:'+351',flag:'🇵🇹',label:'PT'},
    {code:'+49',flag:'🇩🇪',label:'DE'},
    {code:'+39',flag:'🇮🇹',label:'IT'},
  ];

  function handleStart(){
    const info={name,idaData,idaHorario,voltaData,voltaHorario,hospedagem,phone:`${countryCode} ${phone}`};
    localStorage.setItem('ea_userinfo',JSON.stringify(info));
    go('chooser',{userInfo:info});
  }

  const inputStyle={
    width:'100%',background:'rgba(255,255,255,.08)',border:'1px solid rgba(255,255,255,.18)',
    borderRadius:12,padding:'12px 14px',color:WHITE,fontSize:13,fontFamily:'Outfit,sans-serif',
    outline:'none',WebkitAppearance:'none',colorScheme:'dark',
  };
  const labelStyle={fontSize:9.5,fontWeight:700,letterSpacing:'.14em',textTransform:'uppercase',
    color:'rgba(255,255,255,.45)',marginBottom:6,display:'block'};
  const rowStyle={marginBottom:16};
  const optStyle={...labelStyle,display:'inline',fontWeight:400,opacity:.5,fontSize:8.5,letterSpacing:'.05em'};

  return(
    <div className="screen slide-in" style={{background:'linear-gradient(160deg,#0d2d3d 0%,#1a5570 45%,#2e8fa8 80%,#c4a96a 100%)'}}>
      <div className="island" style={{background:'rgba(13,26,30,.9)'}}/>
      {/* Lang toggle */}
      <button onClick={toggleLang} style={{
        position:'absolute',top:16,right:20,zIndex:80,
        background:'rgba(255,255,255,.12)',backdropFilter:'blur(8px)',
        border:'1px solid rgba(255,255,255,.2)',borderRadius:20,
        padding:'5px 12px',fontSize:11,fontWeight:700,color:WHITE,
        display:'flex',alignItems:'center',gap:5,
      }}>
        <span>{lang==='pt'?'🇺🇸':'🇧🇷'}</span>
        <span>{lang==='pt'?'EN':'PT'}</span>
      </button>

      <div className="screen-scroll" style={{paddingTop:60}}>
        {/* Hero */}
        <div style={{textAlign:'center',padding:'20px 24px 28px'}}>
          <img src={LOGO_B64} alt="Explore Atins" style={{width:110,height:110,marginBottom:16,filter:'drop-shadow(0 8px 24px rgba(0,0,0,.35))'}}/>
          <h1 style={{fontFamily:'"Cormorant Garamond",serif',fontSize:34,fontWeight:300,color:WHITE,lineHeight:1.05,marginBottom:8}}>
            {t('welcome_to')}<br/><em style={{color:'#f5c860',fontStyle:'italic'}}>Explore Atins</em>
          </h1>
          <p style={{fontSize:13,color:'rgba(255,255,255,.55)',lineHeight:1.6,fontStyle:'italic'}}>{t('tagline')}</p>
        </div>

        {/* Form */}
        <div style={{background:'rgba(255,255,255,.06)',backdropFilter:'blur(20px)',borderRadius:'28px 28px 0 0',padding:'28px 24px 40px',borderTop:'1px solid rgba(255,255,255,.1)'}}>
          <p style={{fontSize:12,fontWeight:600,color:'rgba(255,255,255,.7)',marginBottom:20,textAlign:'center'}}>{t('fill_in')}</p>

          <div style={rowStyle}>
            <label style={labelStyle}>{t('your_name')} <span style={optStyle}>{t('optional')}</span></label>
            <input style={inputStyle} placeholder={t('name_ph')} value={name} onChange={e=>setName(e.target.value)}/>
          </div>

          {/* Phone */}
          <div style={rowStyle}>
            <label style={labelStyle}>{t('phone')} <span style={optStyle}>{t('optional')}</span></label>
            <div style={{display:'flex',gap:8}}>
              <select value={countryCode} onChange={e=>setCountryCode(e.target.value)}
                style={{...inputStyle,width:'auto',flexShrink:0,padding:'12px 10px',cursor:'pointer',
                  backgroundImage:'none'}}>
                {COUNTRIES.map(c=>(<option key={c.code} value={c.code}>{c.flag} {c.code}</option>))}
              </select>
              <input style={{...inputStyle,flex:1}} placeholder={t('phone_ph')} value={phone}
                onChange={e=>setPhone(e.target.value)} type="tel"/>
            </div>
          </div>

          <div style={{height:1,background:'rgba(255,255,255,.1)',marginBottom:16}}/>
          <p style={{...labelStyle,color:'rgba(255,255,255,.6)',marginBottom:12,display:'block'}}>{t('flight_out')} <span style={optStyle}>{t('optional')}</span></p>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
            <div>
              <label style={labelStyle}>{t('date')}</label>
              <input type="date" style={inputStyle} value={idaData} onChange={e=>setIdaData(e.target.value)}/>
            </div>
            <div>
              <label style={labelStyle}>{t('time_lbl')}</label>
              <input type="time" style={inputStyle} value={idaHorario} onChange={e=>setIdaHorario(e.target.value)}/>
            </div>
          </div>

          <p style={{...labelStyle,color:'rgba(255,255,255,.6)',marginBottom:12,display:'block'}}>{t('flight_back')} <span style={optStyle}>{t('optional')}</span></p>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
            <div>
              <label style={labelStyle}>{t('date')}</label>
              <input type="date" style={inputStyle} value={voltaData} onChange={e=>setVoltaData(e.target.value)}/>
            </div>
            <div>
              <label style={labelStyle}>{t('time_lbl')}</label>
              <input type="time" style={inputStyle} value={voltaHorario} onChange={e=>setVoltaHorario(e.target.value)}/>
            </div>
          </div>

          <div style={{height:1,background:'rgba(255,255,255,.1)',marginBottom:16}}/>
          <div style={rowStyle}>
            <label style={labelStyle}>{t('accommodation')} <span style={optStyle}>{t('optional')}</span></label>
            <input style={inputStyle} placeholder={t('accomm_ph')} value={hospedagem} onChange={e=>setHospedagem(e.target.value)}/>
          </div>

          <button onClick={handleStart} style={{
            width:'100%',marginTop:8,
            background:'linear-gradient(135deg,#e07b3a,#f5a872)',
            color:WHITE,border:'none',borderRadius:16,padding:'17px',
            fontSize:15,fontWeight:700,fontFamily:'Outfit,sans-serif',
            boxShadow:'0 12px 32px rgba(224,123,58,.45)',letterSpacing:'.02em',
          }}>
            {t('explore_btn')}
          </button>
          <p style={{fontSize:10,color:'rgba(255,255,255,.3)',textAlign:'center',marginTop:12}}>{t('optional_hint')}</p>
        </div>
      </div>
    </div>
  );
}

// ── SCREEN: LOCATION CHOOSER ───────────────────────────────────
function ChooserScreen({go,lang,toggleLang,t,cart,back}){
  return(
    <div className="screen slide-in">
      <div className="island"/>
      <div style={{background:DARK,flex:1,display:'flex',flexDirection:'column'}}>
        <StatusBar light/>
        {/* Lang toggle */}
        <button onClick={toggleLang} style={{position:'absolute',top:16,right:20,zIndex:80,background:'rgba(255,255,255,.12)',backdropFilter:'blur(8px)',border:'1px solid rgba(255,255,255,.2)',borderRadius:20,padding:'5px 12px',fontSize:11,fontWeight:700,color:WHITE,display:'flex',alignItems:'center',gap:5}}>
          <span>{lang==='pt'?'🇺🇸':'🇧🇷'}</span><span>{lang==='pt'?'EN':'PT'}</span>
        </button>
        <div className="screen-scroll" style={{background:DARK}}>
          <div style={{padding:'10px 22px 22px'}}>
            <p style={{fontSize:10,color:'rgba(255,255,255,.4)',letterSpacing:'.14em',textTransform:'uppercase',marginBottom:6}}>Lençóis Maranhenses</p>
            <h1 style={{fontFamily:'"Cormorant Garamond",serif',fontSize:32,fontWeight:300,color:WHITE,lineHeight:1.05,marginBottom:8}}>
              {t('chooser_title')}<br/><em style={{color:ORANGE,fontStyle:'italic'}}>{t('chooser_em')}</em>
            </h1>
            <p style={{fontSize:12,color:'rgba(255,255,255,.38)',lineHeight:1.6}}>{t('chooser_sub')}</p>
          </div>
          <div style={{padding:'0 16px',display:'flex',flexDirection:'column',gap:14}}>
            {ALL_LOCS.map((loc,idx)=>(
              <div key={loc.id} onClick={()=>go('feed',{locId:loc.id})}
                style={{borderRadius:22,overflow:'hidden',border:'1px solid rgba(255,255,255,.08)',cursor:'pointer',boxShadow:'0 4px 24px rgba(0,0,0,.3)'}}>
                <div style={{height:100,background:loc.heroGrad,position:'relative',display:'flex',alignItems:'flex-end',padding:'0 16px 12px'}}>
                  <div style={{position:'absolute',inset:0,backgroundImage:'repeating-linear-gradient(45deg,rgba(255,255,255,.03) 0,rgba(255,255,255,.03) 1px,transparent 1px,transparent 14px)'}}/>
                  <div style={{position:'absolute',top:12,right:14,background:'rgba(0,0,0,.4)',backdropFilter:'blur(8px)',borderRadius:20,padding:'3px 10px',display:'flex',alignItems:'center',gap:5}}>
                    <span style={{fontSize:9,color:'rgba(255,255,255,.5)'}}>SCORE</span>
                    <span style={{fontFamily:'"Cormorant Garamond",serif',fontSize:16,fontWeight:600,color:WHITE}}>{loc.score}</span>
                  </div>
                  <div>
                    <div style={{fontSize:10,color:'rgba(255,255,255,.5)',letterSpacing:'.12em',textTransform:'uppercase',marginBottom:3}}>#{idx+1} {t('base_rank')}</div>
                    <div style={{fontFamily:'"Cormorant Garamond",serif',fontSize:22,fontWeight:600,color:WHITE}}>{loc.icon} {loc.name}</div>
                  </div>
                </div>
                <div style={{background:'#0f1e28',padding:'12px 16px 14px'}}>

function CartScreen({go,back,lang,t,cart,setCart,favorites}){
  const total=cart.reduce((s,item)=>s+item.total,0);

  function removeItem(id){
    setCart(c=>{const n=c.filter(x=>x.id!==id);localStorage.setItem('ea_cart',JSON.stringify(n));return n;});
  }

  function sendWhatsApp(){
    const info=JSON.parse(localStorage.getItem('ea_userinfo')||'{}');
    let msg='🌊 *Roteiro Explore Atins*\n';
    msg+='━━━━━━━━━━━━━━━━━━━━━━\n';
    if(info.name)msg+=`👤 *${info.name}*\n`;
    if(info.phone)msg+=`📱 ${info.phone}\n`;
    if(info.idaData)msg+=`✈️ Ida: ${info.idaData} ${info.idaHorario||''}\n`;
    if(info.voltaData)msg+=`✈️ Volta: ${info.voltaData} ${info.voltaHorario||''}\n`;
    if(info.hospedagem)msg+=`🏡 ${info.hospedagem}\n`;
    msg+='\n*📋 Passeios Selecionados:*\n';
    cart.forEach(item=>{
      const loc=LOCATIONS[item.locId];
      const tour=loc.tours.find(x=>x.id===item.tourId);
      msg+=`\n${tour.icon} *${tour.name}* (${loc.name})\n`;
      if(item.day)msg+=`   📅 ${item.day} de Abril 2026 às ${item.time}\n`;
      msg+=`   👥 ${item.travelers} adulto${item.travelers>1?'s':''} · ${item.ptype==='shared'?'Compartilhado':'Privativo'}\n`;
      msg+=`   💰 R$ ${item.total.toLocaleString('pt-BR')}\n`;
    });
    msg+=`\n💰 *Total estimado: R$ ${total.toLocaleString('pt-BR')}*\n`;
    msg+='\nAguardo confirmação! 😊';
    window.open(`https://wa.me/5598981175867?text=${encodeURIComponent(msg)}`,'_blank');
    go('confirm',{fromCart:true,total});

function App(){

  const [lang,setLang]=useState(()=>localStorage.getItem('ea_lang')||'pt');
  function toggleLang(){const nl=lang==='pt'?'en':'pt';setLang(nl);localStorage.setItem('ea_lang',nl);}
  const t=k=>T[lang][k]||T.pt[k]||k;
  const [params,setParams]=useState({});
  const [stack,setStack]=useState([]);

  // Cart & Favorites
  const [cart,setCart]=useState(()=>{try{return JSON.parse(localStorage.getItem('ea_cart'))||[];}catch{return [];}});
  const [favorites,setFavorites]=useState(()=>{try{return JSON.parse(localStorage.getItem('ea_favs'))||[];}catch{return [];}});

  function toggleFav(tourId){
    setFavorites(f=>{
      const n=f.includes(tourId)?f.filter(x=>x!==tourId):[...f,tourId];
      localStorage.setItem('ea_favs',JSON.stringify(n));
      return n;
    });
  }

  function addToCart(item){
    const newItem={...item,id:Date.now()+'_'+Math.random().toString(36).slice(2)};
    setCart(c=>{const n=[...c,newItem];localStorage.setItem('ea_cart',JSON.stringify(n));return n;});
  }

  useEffect(()=>{
    const saved=localStorage.getItem('ea_screen');
    const savedParams=localStorage.getItem('ea_params');
    if(saved&&saved!=='welcome'&&saved!=='chooser'){setScreen(saved);if(savedParams)setParams(JSON.parse(savedParams));}
  },[]);

  function go(newScreen,newParams={}){
    setStack(s=>[...s,{screen,params}]);
    setScreen(newScreen);
    setParams(newParams);
    localStorage.setItem('ea_screen',newScreen);
    localStorage.setItem('ea_params',JSON.stringify(newParams));
  }

  function back(){
    if(stack.length===0){setScreen('chooser');setParams({});return;}
    const prev=stack[stack.length-1];
    setStack(s=>s.slice(0,-1));
    setScreen(prev.screen);
    setParams(prev.params);
  }

  const p=params;
  const shared={go,lang,toggleLang,t,cart,setCart,favorites,toggleFav,addToCart};

  return(
    <div className="phone-shell">
      {screen==='welcome'   && <WelcomeScreen {...shared}/>}
      {screen==='chooser'   && <ChooserScreen {...shared} back={back}/>}
      {screen==='explore'   && <ExploreScreen {...shared} back={back}/>}
      {screen==='favorites' && <FavoritesScreen {...shared} back={back}/>}
      {screen==='cart'      && <CartScreen {...shared} back={back}/>}
      {screen==='feed'      && <FeedScreen {...shared} back={back} locId={p.locId||'atins'}/>}
      {screen==='detail'    && <DetailScreen {...shared} back={back} locId={p.locId} tourId={p.tourId}/>}
      {screen==='datepicker'&& <DateScreen {...shared} back={back} locId={p.locId} tourId={p.tourId} ptype={p.ptype} price={p.price}/>}
      {screen==='confirm'   && <ConfirmScreen {...shared} back={back} locId={p.locId} tourId={p.tourId} ptype={p.ptype} price={p.price} day={p.day} time={p.time} travelers={p.travelers} total={p.total}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
